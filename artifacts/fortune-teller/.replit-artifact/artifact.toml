kind = "web"
previewPath = "/"
title = "Coffee Fortune Teller"
version = "1.0.0"
id = "artifacts/fortune-teller"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22956
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/fortune-teller run dev"

[services.env]
PORT = "22956"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/fortune-teller", "run", "build"]
publicDir = "artifacts/fortune-teller/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
